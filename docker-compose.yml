services:

  orion:
    image: fiware/orion:3.10.1
    hostname: orion
    container_name: fiware-orion
    depends_on:
      - mongo-db
    ports:
      - "1026:1026"
    command: -dbhost mongo-db -logLevel DEBUG

  mongo-db:
    image: mongo:4.4
    hostname: mongo-db
    container_name: db-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db

  influxdb:
    image: influxdb:2.7
    hostname: influxdb
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin1234
      - DOCKER_INFLUXDB_INIT_ORG=virtual-gateway
      - DOCKER_INFLUXDB_INIT_BUCKET=energy_readings

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  quantumleap:
    image: orchestracities/quantumleap:latest
    hostname: quantumleap
    container_name: quantumleap
    ports:
      - "8668:8668"
    depends_on:
      - orion
      - influxdb
    environment:
      - INFLUX_HOST=influxdb
      - INFLUX_PORT=8086
      - INFLUX_TOKEN=admin1234
      - INFLUX_ORG=virtual-gateway
      - INFLUX_BUCKET=energy_readings

  gateway-api:
    build: ./api
    container_name: gateway-api
    ports:
      - "8000:8000"
    depends_on:
      - orion
      - influxdb
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=F5qPXJNO8S_fRQgl42ubxgLjqwC55RKYBd36CrBo0tD2PSHs5n-1viYoB8mM-aNzZK-a4EdOV-H_n-tKI5Zkrg==
      - INFLUX_ORG=virtual-gateway
      - INFLUX_BUCKET=energy_readings
      - ORION_URL=http://orion:1026